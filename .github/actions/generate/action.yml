name: Generate Anytype provider code
description: >
  Fetches the pinned Anytype OpenAPI document, produces the Provider Code
  Specification (IR), and regenerates the Terraform Plugin Framework schemas
  under internal/generated/. Expects Go to already be set up on the runner.

inputs:
  codegen-openapi-version:
    description: Version of the tfplugingen-openapi CLI to install.
    required: false
    default: latest
  codegen-framework-version:
    description: Version of the tfplugingen-framework CLI to install.
    required: false
    default: latest

runs:
  using: composite
  steps:
    - name: Install codegen CLIs
      shell: bash
      run: |
        go install github.com/hashicorp/terraform-plugin-codegen-openapi/cmd/tfplugingen-openapi@${{ inputs.codegen-openapi-version }}
        go install github.com/hashicorp/terraform-plugin-codegen-framework/cmd/tfplugingen-framework@${{ inputs.codegen-framework-version }}
        echo "$(go env GOPATH)/bin" >>"$GITHUB_PATH"

    - name: Regenerate provider code
      shell: bash
      run: make generate
